name: "Application CI/CD Pipeline"

on:
  push:
    branches: [ main ]
    paths:
      - 'website/**'
  workflow_dispatch:

jobs:
  app-deploy:
    runs-on: ubuntu-latest
    env:
      S3_BUCKET: ${{ secrets.S3_ARTIFACT_BUCKET }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install linters
        run: npm install -g htmlhint stylelint stylelint-config-standard

      - name: Lint HTML
        run: htmlhint website/index.html

      - name: Lint CSS
        run: stylelint "website/css/*.css"

      - name: Build Docker test image
        run: docker build -t zoo-test .

      - name: Run container and check
        run: |
          docker run -d -p 8080:80 --name test-nginx zoo-test
          sleep 3
          curl --fail http://localhost:8080 || exit 1
          docker stop test-nginx && docker rm test-nginx

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}

      - name: Upload artifact to S3
        run: |
          zip -r website-artifact.zip website
          aws s3 cp website-artifact.zip s3://$S3_BUCKET/website-${GITHUB_SHA}.zip
          aws s3 cp website-artifact.zip s3://$S3_BUCKET/website-latest.zip

      - name: Install Ansible
        run: pip install ansible boto3

      - name: Run Ansible deploy (local copy method)
        working-directory: ansible
        run: |
          # Write a temporary deploy playbook that copies from the runner
          cat << 'EOF' > playbooks/deploy-website-ci.yml
          - name: Deploy website from CI
            hosts: _zoo_web_asg
            become: yes
            tasks:
              - name: Remove old website files
                file:
                  path: /var/www/html
                  state: absent
              - name: Recreate web root
                file:
                  path: /var/www/html
                  state: directory
                  owner: www-data
                  group: www-data
                  mode: '0755'
              - name: Copy website from local workspace
                copy:
                  src: ../website/
                  dest: /var/www/html/
                  owner: www-data
                  group: www-data
              - name: Restart Nginx
                systemd:
                  name: nginx
                  state: restarted
          EOF
          ansible-playbook playbooks/deploy-website-ci.yml \
            -i inventory/aws_ec2.yml \
            --private-key <(echo "${{ secrets.SSH_PRIVATE_KEY }}") \
            -u ubuntu
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
