name: "Application CI/CD Pipeline"

on:
  push:
    branches: [ main ]
    paths:
      - 'website/**'
  workflow_dispatch:

jobs:
  app-deploy:
    runs-on: ubuntu-latest
    env:
      S3_BUCKET: ${{ secrets.S3_ARTIFACT_BUCKET }}

    steps:
      - uses: actions/checkout@v4

      # Lint HTML and CSS
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install linters
        run: npm install -g htmlhint stylelint stylelint-config-standard

      - name: Lint HTML
        run: htmlhint website/index.html

      - name: Lint CSS
        run: stylelint "website/css/*.css"

      # Docker test
      - name: Build Docker test image
        run: docker build -t zoo-test -f docker/Dockerfile .

      - name: Run container and check
        run: |
          docker run -d -p 8080:80 --name test-nginx zoo-test
          sleep 3
          curl --fail http://localhost:8080 || exit 1
          docker stop test-nginx && docker rm test-nginx

      # Prepare artifact (zip or just sync folder)
      - name: Compress website (optional, but we'll use aws s3 sync)
        run: zip -r website-artifact.zip website

      # Upload to S3 artifact bucket
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_DEFAULT_REGION }}

      - name: Upload to S3 (versioned artifact)
        run: |
          aws s3 cp website-artifact.zip s3://$S3_BUCKET/website-${GITHUB_SHA}.zip
          aws s3 cp website-artifact.zip s3://$S3_BUCKET/website-latest.zip

      # Deploy using Ansible playbook (pull artifact from S3)
      - name: Install Ansible
        run: pip install ansible boto3

      - name: Run deploy playbook
        working-directory: ansible
        run: |
          ansible-playbook playbooks/deploy-website.yml \
            -i inventory/aws_ec2.yml \
            --extra-vars "artifact_path=s3://$S3_BUCKET/website-latest.zip build_sha=${GITHUB_SHA}" \
            --private-key ${{ secrets.SSH_PRIVATE_KEY }} \
            -u ubuntu
