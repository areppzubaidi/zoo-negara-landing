---
- name: Download and install node_exporter
  get_url:
    url: "https://github.com/prometheus/node_exporter/releases/download/v1.7.0/node_exporter-1.7.0.linux-amd64.tar.gz"
    dest: /tmp/node_exporter.tar.gz

- name: Extract node_exporter
  unarchive:
    src: /tmp/node_exporter.tar.gz
    dest: /usr/local/bin
    remote_src: yes
    creates: /usr/local/bin/node_exporter-1.7.0.linux-amd64/node_exporter

- name: Copy node_exporter binary to path
  copy:
    src: /usr/local/bin/node_exporter-1.7.0.linux-amd64/node_exporter
    dest: /usr/local/bin/node_exporter
    mode: 0755
    remote_src: yes

- name: Create node_exporter systemd service
  copy:
    content: |
      [Unit]
      Description=Node Exporter
      After=network.target
      [Service]
      User=nobody
      ExecStart=/usr/local/bin/node_exporter
      [Install]
      WantedBy=multi-user.target
    dest: /etc/systemd/system/node_exporter.service

- name: Start and enable node_exporter
  systemd:
    name: node_exporter
    state: started
    enabled: yes
