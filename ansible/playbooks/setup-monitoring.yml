---
- name: Install Prometheus and Grafana
  hosts: _zoo_monitoring
  become: yes
  tasks:
    - name: Download Prometheus
      get_url:
        url: https://github.com/prometheus/prometheus/releases/download/v2.51.0/prometheus-2.51.0.linux-amd64.tar.gz
        dest: /tmp/prometheus.tar.gz

    - name: Extract Prometheus
      unarchive:
        src: /tmp/prometheus.tar.gz
        dest: /opt
        remote_src: yes

    - name: Copy prometheus config
      template:
        src: templates/prometheus.yml.j2
        dest: /opt/prometheus-2.51.0.linux-amd64/prometheus.yml

    - name: Create systemd service for Prometheus
      copy:
        dest: /etc/systemd/system/prometheus.service
        content: |
          [Unit]
          Description=Prometheus
          After=network.target
          [Service]
          ExecStart=/opt/prometheus-2.51.0.linux-amd64/prometheus --config.file=/opt/prometheus-2.51.0.linux-amd64/prometheus.yml
          [Install]
          WantedBy=multi-user.target

    - name: Start and enable Prometheus
      systemd:
        name: prometheus
        state: started
        enabled: yes

    - name: Install Grafana (apt)
      apt:
        deb: https://dl.grafana.com/oss/release/grafana_10.4.0_amd64.deb

    - name: Start and enable Grafana
      systemd:
        name: grafana-server
        state: started
        enabled: yes
